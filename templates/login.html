<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ThreatTrace Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white flex items-center justify-center min-h-screen">

    <div class="bg-gray-900 border border-gray-800 p-8 rounded-xl w-96 shadow-lg">

        <!-- HEADER -->
        <h1 class="text-2xl font-bold mb-2 text-center text-blue-400">
            ThreatTrace SOC Login
        </h1>

        <p class="text-gray-500 text-sm text-center mb-6">
            Secure Analyst Access Portal
        </p>

        <!-- ERROR -->
        {% if error %}
            <div class="bg-red-500/10 border border-red-500 text-red-400 text-sm p-2 rounded mb-4 text-center">
                {{ error }}
            </div>
        {% endif %}

        <!-- FORM -->
        <form method="POST" class="space-y-4">

            <div>
                <label class="text-xs text-gray-400">Username</label>
                <input
                    name="username"
                    placeholder="Enter username"
                    class="w-full mt-1 p-3 bg-gray-800 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
                    autocomplete="off"
                    required
                >
            </div>

            <div>
                <label class="text-xs text-gray-400">Password</label>
                <input
                    name="password"
                    type="password"
                    placeholder="Enter password"
                    class="w-full mt-1 p-3 bg-gray-800 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
                    required
                >
            </div>

            <button
                type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 transition p-3 rounded-lg font-semibold"
            >
                Secure Login
            </button>

        </form>

        <!-- FOOTER -->
        <div class="text-gray-500 text-xs mt-5 text-center">
            SOC Demo Credentials: <b>admin / admin123</b>
        </div>

    </div>

</body>
</html>
