<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ThreatTrace</title>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Leaflet (for LIVE MAP) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-950 text-white">

    <!-- NAVBAR -->
    <nav class="flex justify-between items-center px-6 py-4 border-b border-gray-800">

        <div class="text-blue-400 font-bold text-xl tracking-wide">
            ThreatTrace
        </div>

        <div class="space-x-6 text-sm text-gray-300">
            <a href="/" class="hover:text-white transition">Home</a>
            <a href="/dashboard" class="hover:text-white transition">Dashboard</a>
        </div>

    </nav>

    <!-- PAGE CONTENT -->
    <main class="p-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
